services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stp_user
      POSTGRES_PASSWORD: stp_pass
      POSTGRES_DB: stp_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stp_user -d stp_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the postgres container hostname
      DATABASE_URL: postgresql://stp_user:stp_pass@postgres:5432/stp_agent
    volumes:
      # Mount source for hot-reload in dev; remove for production
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    profiles:
      - test

volumes:
  postgres_data:
