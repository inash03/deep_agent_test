name: Deploy to GCP # Phase 25: Basic Auth + API key protection

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'mcp_server/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'scripts/**'
      - '.github/workflows/**'
  # Actions タブから手動実行（ブランチは UI で選択可能）
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-mcp-server:
    runs-on: ubuntu-latest
    environment: GCP_VM
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    env:
      REGION: us-central1
      SERVICE_NAME: stp-mcp-external-data
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stp-agent/mcp-external-data
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            -f mcp_server/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --min-instances=0 --memory=256Mi --allow-unauthenticated --port=8080

  deploy-backend:
    runs-on: ubuntu-latest
    environment: GCP_VM
    needs: deploy-mcp-server
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    env:
      REGION: us-central1
      SERVICE_NAME: stp-agent-backend
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stp-agent/backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            --target production \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --min-instances=1 --memory=1Gi --allow-unauthenticated --port=8000
          secrets: |
            ANTHROPIC_API_KEY=anthropic-api-key:latest
            DATABASE_URL=database-url:latest
            API_KEY=api-key:latest
            OPENAI_API_KEY=openai-api-key:latest
          env_vars: |
            SECRET_BACKEND=env
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MCP_EXTERNAL_DATA_URL=${{ needs.deploy-mcp-server.outputs.url }}/sse

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: GCP_VM
    needs: deploy-backend
    env:
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stp-agent/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        working-directory: frontend
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy frontend to VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          CLOUD_RUN_URL: ${{ needs.deploy-backend.outputs.url }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          DEPLOY_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stp-agent/frontend:${{ github.sha }}
          DEPLOY_REF: ${{ github.sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          envs: CLOUD_RUN_URL,APP_USERNAME,APP_PASSWORD,DEPLOY_IMAGE,DEPLOY_REF
          script: |
            set -e
            cd ~/deep_agent_test
            git fetch origin "$DEPLOY_REF"
            git reset --hard "$DEPLOY_REF"
            # .env に必要な値を更新
            for var in VITE_API_URL APP_USERNAME APP_PASSWORD FRONTEND_IMAGE; do
              case $var in
                VITE_API_URL)    val="$CLOUD_RUN_URL" ;;
                FRONTEND_IMAGE)  val="$DEPLOY_IMAGE" ;;
                *)               eval "val=\$$var" ;;
              esac
              if grep -q "^${var}=" .env; then
                sed -i "s|^${var}=.*|${var}=$val|" .env
              else
                echo "${var}=$val" >> .env
              fi
            done
            # GitHub Runner でビルド済みのイメージを pull して起動
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
            docker pull "$DEPLOY_IMAGE"
            docker compose up -d
            docker compose ps

  smoke-test:
    runs-on: ubuntu-latest
    environment: GCP_VM
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://${{ secrets.VM_HOST }}:5173
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: npm run test:e2e

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
