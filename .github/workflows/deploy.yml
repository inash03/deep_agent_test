name: Deploy backend to GCP

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - 'mcp_server/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy-mcp-server:
    runs-on: ubuntu-latest
    environment: GCP_VM
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    env:
      REGION: us-central1
      SERVICE_NAME: stp-mcp-external-data
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stp-agent/mcp-external-data
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            -f mcp_server/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --min-instances=0 --memory=256Mi --allow-unauthenticated --port=8080

  deploy-backend:
    runs-on: ubuntu-latest
    environment: GCP_VM
    needs: deploy-mcp-server
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    env:
      REGION: us-central1
      SERVICE_NAME: stp-agent-backend
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stp-agent/backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            --target production \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --min-instances=1 --memory=1Gi --allow-unauthenticated --port=8000
          secrets: |
            ANTHROPIC_API_KEY=anthropic-api-key:latest
            DATABASE_URL=database-url:latest
            API_KEY=api-key:latest
            OPENAI_API_KEY=openai-api-key:latest
          env_vars: |
            SECRET_BACKEND=env
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MCP_EXTERNAL_DATA_URL=${{ needs.deploy-mcp-server.outputs.url }}/sse
