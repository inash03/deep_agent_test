# alembic.ini — Alembic 設定ファイル
#
# 主な設定項目:
#   script_location  — alembic/ ディレクトリのパス
#   sqlalchemy.url   — DB接続文字列（ここには書かない! env.py で DATABASE_URL から読む）
#
# よく使うコマンド:
#   alembic upgrade head           — 未適用の migration を全て適用
#   alembic downgrade -1           — 直前の migration を1つ取り消し
#   alembic revision --autogenerate -m "説明"  — モデル差分から migration ファイル生成
#   alembic history                — migration 履歴を一覧表示
#   alembic current                — 現在 DB に適用されているバージョンを表示

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url は env.py の os.environ["DATABASE_URL"] で上書きされる
# ここに実際の URL を書かないこと（シークレット漏洩防止）
sqlalchemy.url = postgresql://placeholder/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
